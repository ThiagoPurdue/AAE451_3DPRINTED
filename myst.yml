# ============================================================
# AAE 451 - Aircraft Conceptual Design: Jupyter Book Config
# Optimized for dual-distribution: HTML (interactive) + PDF
# ============================================================
version: 1

project:
  title: "AAE 451 - Aircraft Conceptual Design"
  subtitle: "3D-Printed Aircraft Design Course Notes"
  authors:
    - name: "Thiago Guimaraes"
      affiliations:
        - "Purdue University"
  date: 2026-04-30
  copyright: "2026"
  license: CC-BY-4.0
  subject: "Aerospace Engineering"
  keywords:
    - aircraft design
    - constraint diagram
    - weight estimation
    - electric aircraft
  abbreviations:
    AR: Aspect Ratio
    WER: Weight Estimating Relationship
    DBF: Design Build Fly
  math:
    '\etap': '\eta_p'
    '\etam': '\eta_m'
    '\eB': 'e_B'

  toc:
    - file: index.md
    - title: "Lecture Notes"
      children:
        - file: lecture_02_constraint_diagram.md
        - file: lecture_04_initial_weight_estimation.md
        - file: lecture_05_wing_and_tail_design.md

  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/AAE451_3DPRINTED_LectureNotes.pdf
      article_type: Report

site:
  base_url: /AAE451_3DPRINTED
  title: "AAE 451 - Aircraft Conceptual Design"
  options:
    favicon: ""
    logo: ""
  template: book-theme
